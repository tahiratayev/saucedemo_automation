[pytest]
addopts = -v --tb=short --alluredir=reports/allure-results
testpaths = steps
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    smoke: critical path tests, run on every PR
    regression: full regression suite
    login: login feature tests
    inventory: inventory page tests
    checkout: checkout flow tests
    api: API layer tests (mock server)
